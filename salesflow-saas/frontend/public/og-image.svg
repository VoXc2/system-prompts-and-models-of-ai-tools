<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E4A7C"/>
      <stop offset="40%" stop-color="#0B3B66"/>
      <stop offset="100%" stop-color="#071E33"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="350" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0FAF9A"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="xG" x1="0" y1="0" x2="64" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14C8AD"/>
      <stop offset="100%" stop-color="#0FAF9A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#0FAF9A" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Large logo icon -->
  <g transform="translate(100, 170)">
    <path d="M0 0h56c35.3 0 64 28.7 64 64s-28.7 64-64 64H0V0z" fill="#E2E8F0" opacity="0.9"/>
    <path d="M22 112L40 52" stroke="url(#xG)" stroke-width="9" stroke-linecap="round"/>
    <path d="M58 112L40 52" stroke="url(#xG)" stroke-width="9" stroke-linecap="round"/>
    <path d="M40 32L40 52" stroke="#F97316" stroke-width="7" stroke-linecap="round"/>
    <path d="M28 44L40 32L52 44" stroke="#F97316" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="40" cy="32" r="5" fill="#F97316" opacity="0.5"/>
  </g>
  <!-- Brand name -->
  <text x="200" y="235" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="800" fill="#F8FAFC" letter-spacing="4">DEALIX</text>
  <!-- Accent gradient line -->
  <rect x="200" y="258" width="350" height="4" rx="2" fill="url(#accentLine)"/>
  <!-- Arabic tagline -->
  <text x="200" y="310" font-family="IBM Plex Sans Arabic, Tajawal, sans-serif" font-size="34" fill="#CBD5E1">نظام الإيرادات الذكي</text>
  <!-- English tagline -->
  <text x="200" y="350" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#64748B" letter-spacing="0.5">AI Revenue Operating System for Saudi SMEs</text>
  <!-- Feature pills -->
  <g transform="translate(200, 400)">
    <rect x="0" y="0" width="170" height="44" rx="22" fill="#0FAF9A" opacity="0.12"/>
    <text x="85" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0FAF9A" text-anchor="middle">10 AI Agents</text>
    <rect x="190" y="0" width="190" height="44" rx="22" fill="#F97316" opacity="0.12"/>
    <text x="285" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#F97316" text-anchor="middle">WhatsApp CRM</text>
    <rect x="400" y="0" width="200" height="44" rx="22" fill="#C89B3C" opacity="0.12"/>
    <text x="500" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#C89B3C" text-anchor="middle">Smart Booking</text>
    <rect x="620" y="0" width="200" height="44" rx="22" fill="#0FAF9A" opacity="0.12"/>
    <text x="720" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#14C8AD" text-anchor="middle">Voice AI Calls</text>
  </g>
  <!-- Bottom accent bar -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#accentLine)" opacity="0.8"/>
  <!-- Domain -->
  <text x="1080" y="575" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#475569" text-anchor="end">dealix.ai</text>
</svg>
