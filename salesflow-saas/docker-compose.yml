version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-salesflow}
      POSTGRES_USER: ${DB_USER:-salesflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-salesflow_secret_2024}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-salesflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      # Repo-root marketing assets (paths used when MARKETING_STATIC_ROOT=/salesflow)
      - ./sales_assets:/salesflow/sales_assets:ro
      - ./presentations:/salesflow/presentations:ro
    environment:
      MARKETING_STATIC_ROOT: /salesflow
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery_worker:
    build: ./backend
    restart: always
    command: celery -A app.workers.celery_app worker -l info -c 4
    volumes:
      - ./backend/app:/app/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    restart: always
    command: celery -A app.workers.celery_app beat -l info
    volumes:
      - ./backend/app:/app/app
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

  # ── Sovereign OS Infrastructure (activate per-plane as needed) ──

  temporal:
    image: temporalio/auto-setup:1.25
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${DB_USER:-salesflow}
      POSTGRES_PWD: ${DB_PASSWORD:-salesflow_secret_2024}
      POSTGRES_SEEDS: db
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - execution-plane

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    profiles:
      - execution-plane

  opa:
    image: openpolicyagent/opa:0.70.0
    restart: unless-stopped
    ports:
      - "8181:8181"
    command: run --server --log-level info
    profiles:
      - trust-plane

  openfga:
    image: openfga/openfga:v1.8
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "3001:3000"
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${DB_USER:-salesflow}:${DB_PASSWORD:-salesflow_secret_2024}@db:5432/openfga?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - trust-plane

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "9090:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: ${DB_USER:-salesflow}
      KC_DB_PASSWORD: ${DB_PASSWORD:-salesflow_secret_2024}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command: start-dev
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - trust-plane

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    profiles:
      - data-plane

volumes:
  postgres_data:
