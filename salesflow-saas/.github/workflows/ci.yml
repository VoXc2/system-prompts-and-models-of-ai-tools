name: Dealix CI

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - "salesflow-saas/**"
  pull_request:
    branches: [main]
    paths:
      - "salesflow-saas/**"

defaults:
  run:
    working-directory: salesflow-saas

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_salesflow
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_salesflow
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: salesflow-saas/backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Syntax check all Python files
        run: |
          cd backend
          python -c "
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path('app').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'SYNTAX ERROR: {e}')
              sys.exit(1)
          print(f'All {len(list(pathlib.Path(\"app\").rglob(\"*.py\")))} Python files pass syntax check')
          "

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: salesflow-saas/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Build
        run: |
          cd frontend
          npm run build

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t dealix-backend ./backend

      - name: Build frontend image
        run: docker build -t dealix-frontend ./frontend

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          cd backend
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" app/ --include="*.py" 2>/dev/null; then
            echo "ERROR: Potential API key found in source code"
            exit 1
          fi
          if grep -rn "EAAP[a-zA-Z0-9]\{20,\}" app/ --include="*.py" 2>/dev/null; then
            echo "ERROR: Potential Facebook token found in source code"
            exit 1
          fi
          echo "No hardcoded secrets found"
