# Install to: /etc/logrotate.d/dealix
# تدوير سجلات Dealix يومياً مع ضغط واستبقاء 14 يوماً

/var/log/dealix/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 dealix dealix
    sharedscripts
    postrotate
        systemctl reload dealix-api >/dev/null 2>&1 || true
    endscript
}
