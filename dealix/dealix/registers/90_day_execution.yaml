    - id: P1-02
      task: "Evidence Pack v1 — bilingual memo + sources + tool ledger"
      status: PLANNED
      owner: "Trust"
    - id: P1-03
      task: "Approval Center v1 persisted in Postgres"
      status: PLANNED
      owner: "Trust"
    - id: P1-04
